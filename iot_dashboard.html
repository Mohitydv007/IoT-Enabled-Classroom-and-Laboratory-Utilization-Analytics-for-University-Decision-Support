<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>OccuSense — Classroom Analytics</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,300&family=DM+Mono:wght@400;500&family=Bebas+Neue&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0d14;
  --bg2:#0f1320;
  --bg3:#141929;
  --surface:#1a2035;
  --surface2:#1f263f;
  --border:#252e4a;
  --border2:#2e3a5c;
  --text:#e8eaf2;
  --text2:#8b92ad;
  --text3:#555e7a;
  --accent:#00e5b0;
  --accent2:#0090ff;
  --accent3:#ff6b35;
  --accent4:#a855f7;
  --warn:#f59e0b;
  --danger:#ef4444;
  --success:#10b981;
  --font:'DM Sans',sans-serif;
  --mono:'DM Mono',monospace;
  --display:'Bebas Neue',cursive;
  --radius:10px;
  --radius-lg:16px;
}
body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;line-height:1.5;overflow-x:hidden}
a{color:inherit;text-decoration:none}
button{font-family:var(--font);cursor:pointer;border:none;background:none}
input,select{font-family:var(--font)}

/* LAYOUT */
.app{display:flex;min-height:100vh}
.sidebar{width:220px;flex-shrink:0;background:var(--bg2);border-right:1px solid var(--border);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto}
.main{flex:1;display:flex;flex-direction:column;min-width:0;overflow-x:hidden}
.topbar{height:56px;background:var(--bg2);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;position:sticky;top:0;z-index:50}
.content{flex:1;padding:24px;overflow-y:auto}

/* SIDEBAR */
.logo{padding:20px 16px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid var(--border)}
.logo-icon{width:32px;height:32px;background:var(--accent);border-radius:8px;display:flex;align-items:center;justify-content:center}
.logo-icon svg{width:18px;height:18px;fill:var(--bg)}
.logo-text{font-family:var(--display);font-size:22px;letter-spacing:1px;color:var(--text)}
.logo-sub{font-size:10px;color:var(--text3);font-weight:500;letter-spacing:2px;text-transform:uppercase}
.nav{padding:12px 8px;flex:1}
.nav-section{font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;color:var(--text3);padding:8px 8px 4px}
.nav-item{display:flex;align-items:center;gap:10px;padding:8px 10px;border-radius:8px;cursor:pointer;transition:all .15s;color:var(--text2);font-size:13px;font-weight:400;margin-bottom:2px}
.nav-item:hover{background:var(--surface);color:var(--text)}
.nav-item.active{background:linear-gradient(135deg,rgba(0,229,176,.12),rgba(0,144,255,.08));color:var(--accent);border:1px solid rgba(0,229,176,.2)}
.nav-icon{width:16px;height:16px;flex-shrink:0;opacity:.7}
.nav-item.active .nav-icon{opacity:1}
.sidebar-footer{padding:12px 8px;border-top:1px solid var(--border)}
.sensor-status{background:var(--surface);border-radius:8px;padding:10px 12px}
.sensor-status-title{font-size:11px;color:var(--text3);font-weight:500;letter-spacing:1px;text-transform:uppercase;margin-bottom:8px}
.sensor-row{display:flex;justify-content:space-between;align-items:center;font-size:12px;margin-bottom:5px}
.dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.dot-green{background:var(--success)}
.dot-warn{background:var(--warn)}
.dot-red{background:var(--danger)}
.pulse{animation:pulse 2s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(1.4)}}

/* TOPBAR */
.tb-breadcrumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.tb-breadcrumb span{color:var(--text)}
.tb-right{margin-left:auto;display:flex;align-items:center;gap:12px}
.tb-chip{display:flex;align-items:center;gap:6px;padding:5px 10px;background:var(--surface);border-radius:20px;font-size:12px;color:var(--text2);border:1px solid var(--border)}
.tb-chip .dot{animation:pulse 2s ease-in-out infinite}
.tb-badge{width:32px;height:32px;border-radius:50%;background:var(--surface2);border:1px solid var(--border2);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer}
.alert-badge{position:relative}
.alert-badge::after{content:'3';position:absolute;top:-2px;right:-2px;width:14px;height:14px;background:var(--danger);border-radius:50%;font-size:9px;display:flex;align-items:center;justify-content:center;font-weight:600;color:#fff;font-family:var(--font)}

/* TABS */
.tabs{display:flex;gap:4px;background:var(--surface);border-radius:10px;padding:4px;width:fit-content;margin-bottom:20px}
.tab{padding:6px 14px;border-radius:7px;cursor:pointer;font-size:13px;color:var(--text2);transition:all .15s;font-weight:400}
.tab.active{background:var(--bg2);color:var(--text);font-weight:500}

/* KPI CARDS */
.kpi-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:24px}
.kpi{background:var(--surface);border-radius:var(--radius-lg);padding:18px 20px;border:1px solid var(--border);position:relative;overflow:hidden;transition:border-color .2s}
.kpi:hover{border-color:var(--border2)}
.kpi::before{content:'';position:absolute;top:0;left:0;right:0;height:2px}
.kpi.teal::before{background:linear-gradient(90deg,var(--accent),transparent)}
.kpi.blue::before{background:linear-gradient(90deg,var(--accent2),transparent)}
.kpi.orange::before{background:linear-gradient(90deg,var(--accent3),transparent)}
.kpi.purple::before{background:linear-gradient(90deg,var(--accent4),transparent)}
.kpi-label{font-size:11px;font-weight:500;letter-spacing:1.5px;text-transform:uppercase;color:var(--text3);margin-bottom:8px}
.kpi-val{font-family:var(--display);font-size:42px;line-height:1;letter-spacing:1px;margin-bottom:4px}
.kpi.teal .kpi-val{color:var(--accent)}
.kpi.blue .kpi-val{color:var(--accent2)}
.kpi.orange .kpi-val{color:var(--accent3)}
.kpi.purple .kpi-val{color:var(--accent4)}
.kpi-sub{font-size:12px;color:var(--text2)}
.kpi-delta{display:inline-flex;align-items:center;gap:3px;font-size:11px;font-weight:500;padding:2px 6px;border-radius:4px;margin-left:6px}
.kpi-delta.up{color:var(--success);background:rgba(16,185,129,.1)}
.kpi-delta.down{color:var(--danger);background:rgba(239,68,68,.1)}

/* GRID LAYOUTS */
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px}
.grid-3{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}
.card{background:var(--surface);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:500;color:var(--text);letter-spacing:.3px}
.card-action{font-size:12px;color:var(--accent);cursor:pointer;font-weight:500}
.card-body{padding:16px 20px}

/* FLOOR MAP */
.floor-map{position:relative;width:100%;aspect-ratio:16/9;background:var(--bg3);border-radius:12px;overflow:hidden}
.floor-grid{position:absolute;inset:0;background-image:linear-gradient(var(--border) 1px,transparent 1px),linear-gradient(90deg,var(--border) 1px,transparent 1px);background-size:32px 32px;opacity:.3}
.room-block{position:absolute;border-radius:6px;cursor:pointer;transition:all .2s;border:1.5px solid transparent;display:flex;flex-direction:column;align-items:center;justify-content:center;font-size:10px;font-weight:500}
.room-block:hover{transform:scale(1.04);z-index:10;box-shadow:0 0 20px rgba(0,229,176,.3)}
.room-block .room-name{color:rgba(255,255,255,.9);margin-bottom:2px;font-size:9px;letter-spacing:.5px}
.room-block .room-pct{font-family:var(--display);font-size:18px;line-height:1}
.room-block.low{background:rgba(16,185,129,.15);border-color:rgba(16,185,129,.4)}
.room-block.low .room-pct{color:var(--success)}
.room-block.mid{background:rgba(245,158,11,.15);border-color:rgba(245,158,11,.4)}
.room-block.mid .room-pct{color:var(--warn)}
.room-block.high{background:rgba(239,68,68,.15);border-color:rgba(239,68,68,.4)}
.room-block.high .room-pct{color:var(--danger)}
.map-legend{position:absolute;bottom:10px;right:10px;display:flex;gap:10px;background:rgba(10,13,20,.7);padding:6px 10px;border-radius:6px}
.map-legend-item{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--text2)}

/* TIMELINE CHART */
.chart-wrap{position:relative;width:100%;height:160px}
.chart-svg{width:100%;height:100%}

/* ROOM TABLE */
.room-table{width:100%;border-collapse:collapse}
.room-table th{font-size:11px;font-weight:500;letter-spacing:1px;text-transform:uppercase;color:var(--text3);padding:8px 12px;text-align:left;border-bottom:1px solid var(--border)}
.room-table td{padding:10px 12px;border-bottom:1px solid rgba(37,46,74,.5);font-size:13px;vertical-align:middle}
.room-table tr:last-child td{border-bottom:none}
.room-table tr:hover td{background:rgba(31,38,63,.5)}
.status-pill{display:inline-flex;align-items:center;gap:5px;padding:3px 8px;border-radius:12px;font-size:11px;font-weight:500}
.pill-green{background:rgba(16,185,129,.1);color:var(--success)}
.pill-warn{background:rgba(245,158,11,.1);color:var(--warn)}
.pill-red{background:rgba(239,68,68,.1);color:var(--danger)}
.pill-gray{background:rgba(139,146,173,.1);color:var(--text2)}
.bar-mini{height:4px;background:var(--border);border-radius:2px;overflow:hidden;width:80px}
.bar-mini-fill{height:100%;border-radius:2px;transition:width .6s}

/* ALERTS PANEL */
.alert-item{display:flex;gap:12px;padding:12px 16px;border-bottom:1px solid rgba(37,46,74,.5);cursor:pointer;transition:background .15s}
.alert-item:hover{background:rgba(31,38,63,.5)}
.alert-item:last-child{border-bottom:none}
.alert-icon{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:14px}
.alert-icon.danger{background:rgba(239,68,68,.1)}
.alert-icon.warn{background:rgba(245,158,11,.1)}
.alert-icon.info{background:rgba(0,144,255,.1)}
.alert-title{font-size:13px;font-weight:500;color:var(--text);margin-bottom:2px}
.alert-sub{font-size:12px;color:var(--text2)}
.alert-time{font-size:11px;color:var(--text3);font-family:var(--mono);margin-left:auto;flex-shrink:0}

/* SENSOR HEALTH */
.sensor-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.sensor-tile{background:var(--bg3);border-radius:10px;padding:12px;border:1px solid var(--border);transition:border-color .2s}
.sensor-tile:hover{border-color:var(--border2)}
.sensor-tile-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px}
.sensor-id{font-family:var(--mono);font-size:11px;color:var(--text3)}
.sensor-val{font-family:var(--display);font-size:28px;line-height:1;color:var(--text);margin-bottom:2px}
.sensor-unit{font-size:11px;color:var(--text3)}
.sensor-type-badge{font-size:10px;padding:2px 6px;border-radius:4px;background:var(--surface2);color:var(--text2);font-weight:500;letter-spacing:.5px;text-transform:uppercase}

/* ML PREDICTION CHART */
.pred-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.pred-label{font-size:12px;color:var(--text2);width:60px;flex-shrink:0}
.pred-bar{flex:1;height:20px;background:var(--bg3);border-radius:4px;overflow:hidden;position:relative}
.pred-fill{height:100%;border-radius:4px;display:flex;align-items:center;justify-content:end;padding-right:6px;font-size:11px;font-weight:500;transition:width 1s}
.pred-peak{position:absolute;top:2px;font-size:10px;color:rgba(255,255,255,.6);padding-left:6px}

/* HEATMAP */
.heatmap-grid{display:grid;grid-template-columns:40px repeat(12,1fr);gap:3px}
.hm-label{font-size:10px;color:var(--text3);display:flex;align-items:center;justify-content:flex-end;padding-right:6px;font-family:var(--mono)}
.hm-cell{aspect-ratio:1;border-radius:3px;cursor:pointer;transition:transform .15s,opacity .15s}
.hm-cell:hover{transform:scale(1.2);z-index:5;opacity:1!important}
.hm-day-label{font-size:10px;color:var(--text3);text-align:center;font-family:var(--mono)}

/* ANIMATIONS */
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes countUp{from{opacity:0}to{opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.fade-up{animation:fadeUp .4s ease forwards}
.fade-up-1{animation-delay:.05s;opacity:0}
.fade-up-2{animation-delay:.1s;opacity:0}
.fade-up-3{animation-delay:.15s;opacity:0}
.fade-up-4{animation-delay:.2s;opacity:0}

/* SCROLLBAR */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:var(--bg2)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* PAGE HEADER */
.page-header{margin-bottom:20px}
.page-title{font-family:var(--display);font-size:36px;letter-spacing:1px;color:var(--text);line-height:1}
.page-sub{font-size:13px;color:var(--text2);margin-top:4px}

/* TOGGLE */
.view-toggle{display:flex;gap:4px}
.view-btn{padding:5px 8px;border-radius:6px;border:1px solid var(--border);color:var(--text2);font-size:12px;transition:all .15s}
.view-btn.active{background:var(--surface2);color:var(--text);border-color:var(--border2)}
.view-btn:hover{color:var(--text)}

/* TOOLTIP */
.tooltip{position:absolute;background:var(--bg2);border:1px solid var(--border2);border-radius:8px;padding:8px 12px;font-size:12px;pointer-events:none;z-index:100;min-width:120px;box-shadow:0 8px 32px rgba(0,0,0,.5)}
.tooltip-title{font-weight:500;color:var(--text);margin-bottom:4px}
.tooltip-row{display:flex;justify-content:space-between;gap:16px;color:var(--text2)}
.tooltip-val{color:var(--text);font-family:var(--mono)}
</style>
</head>
<body>
<div class="app" id="app">

<!-- SIDEBAR -->
<aside class="sidebar">
  <div class="logo">
    <div class="logo-icon">
      <svg viewBox="0 0 24 24"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5c-1.38 0-2.5-1.12-2.5-2.5s1.12-2.5 2.5-2.5 2.5 1.12 2.5 2.5-1.12 2.5-2.5 2.5z"/></svg>
    </div>
    <div>
      <div class="logo-text">OccuSense</div>
      <div class="logo-sub">Analytics Platform</div>

  </div>
  <nav class="nav">
    <div class="nav-section">Overview</div>
    <div class="nav-item active" onclick="showPage('overview')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M3 13h8V3H3v10zm0 8h8v-6H3v6zm10 0h8V11h-8v10zm0-18v6h8V3h-8z"/></svg>
      Dashboard
    </div>
    <div class="nav-item" onclick="showPage('floormap')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M20.5 3l-.16.03L15 5.1 9 3 3.36 4.9c-.21.07-.36.25-.36.48V20.5c0 .28.22.5.5.5l.16-.03L9 18.9l6 2.1 5.64-1.9c.21-.07.36-.25.36-.48V3.5c0-.28-.22-.5-.5-.5zM15 19l-6-2.11V5l6 2.11V19z"/></svg>

      Heatmap
    </div>
    <div class="nav-item" onclick="showPage('predictions')">

      ML Predictions
    </div>
    <div class="nav-section">Management</div>
    <div class="nav-item" onclick="showPage('sensors')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M1 9l2 2c4.97-4.97 13.03-4.97 18 0l2-2C16.93 2.93 7.08 2.93 1 9zm8 8l3 3 3-3c-1.65-1.66-4.34-1.66-6 0zm-4-4l2 2c2.76-2.76 7.24-2.76 10 0l2-2C15.14 9.14 8.87 9.14 5 13z"/></svg>
      Sensors
    </div>
    <div class="nav-item" onclick="showPage('alerts')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 22c1.1 0 2-.9 2-2h-4c0 1.1.9 2 2 2zm6-6v-5c0-3.07-1.64-5.64-4.5-6.32V4c0-.83-.67-1.5-1.5-1.5s-1.5.67-1.5 1.5v.68C7.63 5.36 6 7.92 6 11v5l-2 2v1h16v-1l-2-2z"/></svg>
      Alerts
      <span style="margin-left:auto;background:var(--danger);color:#fff;font-size:10px;padding:1px 5px;border-radius:10px;font-weight:600">3</span>

    <div class="nav-item" onclick="showPage('reports')">
      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M14 2H6c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V8l-6-6zm2 16H8v-2h8v2zm0-4H8v-2h8v2zm-3-5V3.5L18.5 9H13z"/></svg>

      <svg class="nav-icon" viewBox="0 0 24 24" fill="currentColor"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      Settings
    </div>
  </nav>
  <div class="sidebar-footer">
    <div class="sensor-status">
      <div class="sensor-status-title">System Status</div>
      <div class="sensor-row">
        <span style="color:var(--text2)">Sensors online</span>
        <span style="display:flex;align-items:center;gap:5px"><span class="dot dot-green pulse"></span><span style="color:var(--success);font-weight:500;font-family:var(--mono)">47/50</span></span>
      </div>
      <div class="sensor-row">
        <span style="color:var(--text2)">MQTT broker</span>
        <span style="display:flex;align-items:center;gap:5px"><span class="dot dot-green pulse"></span><span style="color:var(--success);font-weight:500;font-size:11px">ONLINE</span></span>
      </div>
      <div class="sensor-row">
        <span style="color:var(--text2)">Data latency</span>
        <span style="color:var(--accent);font-family:var(--mono);font-size:12px">12s</span>
      </div>

function renderTimelineChart(){
  const w=560,h=140;
  const max=100,pts=hourlyData;
  const step=w/23;
  const py=v=>h-10-(v/max)*(h-20);
  const path=pts.map((v,i)=>`${i===0?'M':'L'}${i*step},${py(v)}`).join(' ');
  const area=`${path} L${22*step},${h-10} L0,${h-10} Z`;
  const ticks=[0,6,12,18,23];
  const labels=['00:00','06:00','12:00','18:00','23:00'];
  const now=9;
  return `<svg viewBox="0 -5 ${w} ${h+20}" style="width:100%;height:160px" id="timeline-svg">
    <defs>
      <linearGradient id="tgrad" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stop-color="var(--accent)" stop-opacity="0.3"/>
        <stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/>
      </linearGradient>
    </defs>
    <line x1="0" y1="${h-10}" x2="${w}" y2="${h-10}" stroke="var(--border)" stroke-width="1"/>
    ${[25,50,75].map(v=>`<line x1="0" y1="${py(v)}" x2="${w}" y2="${py(v)}" stroke="var(--border)" stroke-width="0.5" stroke-dasharray="4 4"/>
    <text x="-2" y="${py(v)+4}" fill="var(--text3)" font-size="9" text-anchor="end" font-family="DM Mono,monospace">${v}</text>`).join('')}
    <path d="${area}" fill="url(#tgrad)"/>
    <path d="${path}" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    <line x1="${now*step}" y1="0" x2="${now*step}" y2="${h-10}" stroke="var(--accent3)" stroke-width="1.5" stroke-dasharray="4 3"/>
    <circle cx="${now*step}" cy="${py(pts[now])}" r="5" fill="var(--accent3)" stroke="var(--bg3)" stroke-width="2"/>
    ${ticks.map((t,i)=>`<text x="${t*step}" y="${h+12}" fill="var(--text3)" font-size="9" text-anchor="middle" font-family="DM Mono,monospace">${labels[i]}</text>`).join('')}
    <text x="${now*step+8}" y="${py(pts[now])-8}" fill="var(--accent3)" font-size="10" font-weight="500" font-family="DM Mono,monospace">${pts[now]}%</text>
  </svg>`;
}

          <span style="color:var(--text2)">${k}</span>
          <span style="color:var(--success);font-family:var(--mono)">${v}</span>
        </div>`).join('')}
      </div>
    </div>
  </div>
</div>`;
}

const renders={
  overview:renderOverview,
  floormap:renderFloorMap,
  utilization:renderUtilization,
  heatmap:renderHeatmap,
  predictions:renderPredictions,
  sensors:renderSensors,
  alerts:renderAlerts,
  reports:renderReports,
  settings:renderSettings
};

// Init
renderOverview();
</script>
